# Azurite local Azure Storage emulator for integration testing.
# Start with: docker compose -f docker-compose.azurite.yml up -d
# Stop with:  docker compose -f docker-compose.azurite.yml down
#
# Exposes:
#   Blob  → http://127.0.0.1:10000/devstoreaccount1
#   Queue → http://127.0.0.1:10001/devstoreaccount1
#   Table → http://127.0.0.1:10002/devstoreaccount1

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose"
    restart: unless-stopped
